# rEFInd-lite — A minimal dark rEFInd theme
# Background: one default sci-fi dark image; use configure.py to change it.

# Hide non-essential UI elements for a clean look
hideui hints,label,badges

# Icons directory (OS logos, function icons, arrows)
icons_dir themes/rEFInd-lite/icons

# Selection indicator images
selection_big   themes/rEFInd-lite/selection_big.png
selection_small themes/rEFInd-lite/selection_small.png

# Default background image — change with configure.py
banner themes/rEFInd-lite/bg/background.png

# Available tool buttons
showtools shutdown,reboot,firmware
